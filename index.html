<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>BJJ Data Collector – Simplified</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            text-align: center;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { font-size: 1.6rem; margin: 10px 0; }
        .mode-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 15px 0;
        }
        .mode-btn {
            background: #333;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .mode-btn.active { background: #4CAF50; }
        .panel {
            background: #1e1e1e;
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0;
        }
        .hidden { display: none; }
        .media-container {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin: 10px 0;
            text-align: center;
        }
        video, img, canvas {
            max-width: 100%;
            max-height: 50vh;
            vertical-align: middle;
        }
        canvas { background: #000; width: 100%; height: auto; }
        .controls {
            margin: 10px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button, input {
            background: #2c2c2c;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        input { background: #111; border: 1px solid #444; flex: 1; min-width: 180px; }
        .status { font-size: 0.7rem; color: #aaa; margin: 5px; }
        .save-btn {
            background: #4CAF50;
            margin-top: 10px;
            font-size: 1rem;
            padding: 10px 20px;
        }
        .label-panel {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 12px;
            margin-top: 10px;
            text-align: left;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 10px;
        }
        .label-group {
            background: #1e1e1e;
            padding: 8px;
            border-radius: 6px;
        }
        .label-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.8rem;
        }
        select, textarea {
            width: 100%;
            padding: 5px;
            background: #111;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 0.75rem;
        }
        .shortcut-hint {
            font-size: 0.6rem;
            color: #aaa;
            margin-top: 3px;
        }
        .footer {
            font-size: 0.7rem;
            margin-top: 20px;
            opacity: 0.6;
        }
        .thumbnail-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
            background: #1a1a1a;
            padding: 8px;
            border-radius: 8px;
        }
        .thumbnail {
            position: relative;
            width: 80px;
            height: 60px;
            background: #000;
            border: 1px solid #444;
            cursor: pointer;
        }
        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .thumbnail .delete-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            background: red;
            color: white;
            font-size: 10px;
            width: 16px;
            height: 16px;
            text-align: center;
            border-radius: 50%;
            cursor: pointer;
        }
        .labeler-input {
            background: #111;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 5px;
            width: 100%;
            color: white;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
<div class="container">
    <h1>BJJ Data Collector – Simplified</h1>
    <div class="mode-buttons">
        <button id="btnVideoMode" class="mode-btn active">🎥 Video Mode</button>
        <button id="btnImageMode" class="mode-btn">🖼️ Image Mode</button>
    </div>

    <!-- Video Mode Panel -->
    <div id="videoModePanel" class="panel">
        <div class="media-container"><video id="videoPlayer" controls style="width:100%"></video></div>
        <div class="controls">
            <input type="file" id="videoUpload" accept="video/*">
            <button id="extractFramesBtn">📸 Extract Frames (2 FPS)</button>
        </div>
        <div id="thumbnailContainer" class="thumbnail-grid"></div>
        <div class="status" id="videoStatus">Load a video to begin.</div>
    </div>

    <!-- Image Mode Panel -->
    <div id="imageModePanel" class="panel hidden">
        <div class="media-container"><canvas id="imageCanvas" style="width:100%; background:#000;"></canvas></div>
        <div class="controls">
            <input type="file" id="imageUpload" accept="image/*">
            <button id="loadImageBtn">Load Image</button>
        </div>
        <div class="status" id="imageStatus">Load an image to begin.</div>
    </div>

    <!-- Label Panel -->
    <div class="label-panel" id="labelPanel">
        <div class="label-group required">
            <label>Your Name (for credit)</label>
            <input type="text" id="labelerName" class="labeler-input" placeholder="Enter your name">
        </div>

        <div class="label-group required"><label>Player 1 Role <span class="shortcut-hint">[1]</span></label>
            <select id="role1"><option value="attacking">Attacking</option><option value="defending">Defending</option><option value="neutral">Neutral</option></select>
        </div>
        <div class="label-group required"><label>Player 2 Role <span class="shortcut-hint">[2]</span></label>
            <select id="role2"><option value="attacking">Attacking</option><option value="defending">Defending</option><option value="neutral">Neutral</option></select>
        </div>
        <div class="label-group required"><label>Top Posture <span class="shortcut-hint">[3]</span></label>
            <select id="postureTop"><option value="upright">Upright</option><option value="broken">Broken</option><option value="leaning_forward">Leaning Forward</option><option value="leaning_back">Leaning Back</option><option value="kneeling">Kneeling</option></select>
        </div>
        <div class="label-group required"><label>Bottom State <span class="shortcut-hint">[4]</span></label>
            <select id="bottomState"><option value="active">Active</option><option value="flat">Flat</option><option value="turned">Turned</option><option value="kneeling">Kneeling</option><option value="unknown">Unknown</option></select>
        </div>
        <div class="label-group required"><label>Primary Action <span class="shortcut-hint">[5]</span></label>
            <select id="action"><option value="submission">Submission</option><option value="sweep">Sweep</option><option value="pass">Pass</option><option value="takedown">Takedown</option><option value="escape">Escape</option><option value="grip_fight">Grip Fight</option><option value="none">None</option></select>
        </div>
        <div class="label-group required"><label>Target <span class="shortcut-hint">[6]</span></label>
            <select id="target"><option value="none">None</option><option value="left_arm">Left Arm</option><option value="right_arm">Right Arm</option><option value="left_leg">Left Leg</option><option value="right_leg">Right Leg</option><option value="neck">Neck</option><option value="torso">Torso</option><option value="position">Position</option></select>
        </div>
        <div class="label-group"><label>Notes (optional)</label>
            <textarea id="notes" rows="2" placeholder="Details like % locked, grips, etc."></textarea>
        </div>
    </div>

    <button id="saveBtn" class="save-btn">📤 Upload to Google Drive</button>
    <div id="saveStatus" class="status"></div>
    <div class="footer">Shortcuts: 1‑6 cycle fields. S uploads. Data goes to your Drive.</div>
</div>

<script>
    // --- REPLACE THIS WITH YOUR APPS SCRIPT URL ---
    const APPS_SCRIPT_URL = "YOUR_APPS_SCRIPT_URL";

    let currentMode = 'video';
    let videoFrames = [];
    let currentImageBlob = null;

    // DOM elements
    const videoModePanel = document.getElementById('videoModePanel');
    const imageModePanel = document.getElementById('imageModePanel');
    const videoPlayer = document.getElementById('videoPlayer');
    const videoUpload = document.getElementById('videoUpload');
    const extractFramesBtn = document.getElementById('extractFramesBtn');
    const thumbnailContainer = document.getElementById('thumbnailContainer');
    const videoStatus = document.getElementById('videoStatus');
    const imageCanvas = document.getElementById('imageCanvas');
    const imageUpload = document.getElementById('imageUpload');
    const loadImageBtn = document.getElementById('loadImageBtn');
    const imageStatus = document.getElementById('imageStatus');
    const saveBtn = document.getElementById('saveBtn');
    const saveStatus = document.getElementById('saveStatus');
    const labelerName = document.getElementById('labelerName');

    // Label elements
    const role1 = document.getElementById('role1');
    const role2 = document.getElementById('role2');
    const postureTop = document.getElementById('postureTop');
    const bottomState = document.getElementById('bottomState');
    const action = document.getElementById('action');
    const target = document.getElementById('target');
    const notes = document.getElementById('notes');

    // Keyboard shortcuts
    function cycleSelect(selectId, options, forward) {
        const select = document.getElementById(selectId);
        if (!select) return;
        let idx = select.selectedIndex;
        idx = (idx + (forward ? 1 : -1) + options.length) % options.length;
        select.selectedIndex = idx;
    }
    document.addEventListener('keydown', (e) => {
        const key = e.key;
        const shift = e.shiftKey;
        const forward = !shift;
        if (key === '1') cycleSelect('role1', ['attacking','defending','neutral'], forward);
        else if (key === '2') cycleSelect('role2', ['attacking','defending','neutral'], forward);
        else if (key === '3') cycleSelect('postureTop', ['upright','broken','leaning_forward','leaning_back','kneeling'], forward);
        else if (key === '4') cycleSelect('bottomState', ['active','flat','turned','kneeling','unknown'], forward);
        else if (key === '5') cycleSelect('action', ['submission','sweep','pass','takedown','escape','grip_fight','none'], forward);
        else if (key === '6') cycleSelect('target', ['none','left_arm','right_arm','left_leg','right_leg','neck','torso','position'], forward);
        else if (key === 's' || key === 'S') { e.preventDefault(); uploadToDrive(); }
    });

    function buildCSVLine(sourceType, clipId, frameIndex, timestamp) {
        const labels = [
            sourceType, clipId, frameIndex, timestamp,
            role1.value, role2.value,
            postureTop.value, bottomState.value,
            action.value, target.value,
            notes.value
        ];
        return labels.map(f => `"${String(f).replace(/"/g, '""')}"`).join(',');
    }

    async function uploadToDrive() {
        if (!labelerName.value.trim()) {
            saveStatus.innerText = 'Please enter your name first.';
            return;
        }

        if (currentMode === 'video') {
            if (videoFrames.length === 0) {
                saveStatus.innerText = 'No frames to upload. Extract frames first.';
                return;
            }
            saveStatus.innerText = 'Packing frames...';
            const clipId = Date.now().toString();
            const zip = new JSZip();
            const csvLines = [];
            for (let i = 0; i < videoFrames.length; i++) {
                const frame = videoFrames[i];
                const filename = `frame_${i}_${Math.round(frame.timestamp*10)}.jpg`;
                zip.file(filename, frame.blob);
                const csvLine = buildCSVLine('video_clip', clipId, i, frame.timestamp);
                csvLines.push(csvLine);
            }
            const csvBlob = new Blob([csvLines.join('\n')], {type: 'text/csv'});
            zip.file('labels.csv', csvBlob);
            const zipBlob = await zip.generateAsync({type: 'blob'});

            const formData = new FormData();
            formData.append('labelerName', labelerName.value);
            formData.append('clipId', clipId);
            formData.append('notes', notes.value);
            formData.append('file', zipBlob, `bjj_${clipId}.zip`);

            saveStatus.innerText = 'Uploading...';
            try {
                const response = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: formData });
                const result = await response.text();
                saveStatus.innerText = `✅ Uploaded ${videoFrames.length} frames. Response: ${result}`;
            } catch (err) {
                saveStatus.innerText = 'Upload error: ' + err.message;
            }
        } else {
            if (!currentImageBlob) {
                saveStatus.innerText = 'No image loaded.';
                return;
            }
            const clipId = Date.now().toString();
            const filename = `img_${Date.now()}.jpg`;
            const csvLine = buildCSVLine('image', clipId, 0, 0);
            const csvBlob = new Blob([csvLine], {type: 'text/csv'});
            const zip = new JSZip();
            zip.file(filename, currentImageBlob);
            zip.file('labels.csv', csvBlob);
            const zipBlob = await zip.generateAsync({type: 'blob'});

            const formData = new FormData();
            formData.append('labelerName', labelerName.value);
            formData.append('clipId', clipId);
            formData.append('notes', notes.value);
            formData.append('file', zipBlob, `bjj_img_${clipId}.zip`);

            saveStatus.innerText = 'Uploading...';
            try {
                const response = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: formData });
                const result = await response.text();
                saveStatus.innerText = `✅ Uploaded image. Response: ${result}`;
            } catch (err) {
                saveStatus.innerText = 'Upload error: ' + err.message;
            }
        }
    }

    // Extract frames (2 FPS)
    async function extractFrames(videoElement, fps = 2) {
        videoFrames = [];
        const duration = videoElement.duration;
        const interval = 1 / fps;
        let currentTime = 0;
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        thumbnailContainer.innerHTML = '<div class="status">Extracting frames...</div>';
        for (let t = 0; t < duration; t += interval) {
            videoElement.currentTime = t;
            await new Promise(resolve => { videoElement.onseeked = resolve; });
            canvas.width = videoElement.videoWidth;
            canvas.height = videoElement.videoHeight;
            ctx.drawImage(videoElement, 0, 0);
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
            videoFrames.push({ blob, timestamp: t });
        }
        displayThumbnails();
        videoStatus.innerText = `Extracted ${videoFrames.length} frames. Click thumbnails to delete, then upload.`;
    }

    function displayThumbnails() {
        thumbnailContainer.innerHTML = '';
        videoFrames.forEach((frame, idx) => {
            const url = URL.createObjectURL(frame.blob);
            const div = document.createElement('div');
            div.className = 'thumbnail';
            div.innerHTML = `<img src="${url}" alt="frame ${idx}"><div class="delete-badge" data-idx="${idx}">✖</div>`;
            div.querySelector('.delete-badge').onclick = (e) => {
                e.stopPropagation();
                videoFrames.splice(idx, 1);
                displayThumbnails();
                videoStatus.innerText = `Frame deleted. ${videoFrames.length} remaining.`;
            };
            thumbnailContainer.appendChild(div);
            URL.revokeObjectURL(url);
        });
    }

    // Mode switching
    function setMode(mode) {
        currentMode = mode;
        if (mode === 'video') {
            videoModePanel.classList.remove('hidden');
            imageModePanel.classList.add('hidden');
            document.getElementById('btnVideoMode').classList.add('active');
            document.getElementById('btnImageMode').classList.remove('active');
        } else {
            videoModePanel.classList.add('hidden');
            imageModePanel.classList.remove('hidden');
            document.getElementById('btnVideoMode').classList.remove('active');
            document.getElementById('btnImageMode').classList.add('active');
        }
    }
    document.getElementById('btnVideoMode').onclick = () => setMode('video');
    document.getElementById('btnImageMode').onclick = () => setMode('image');

    // Video upload
    videoUpload.onchange = (e) => {
        if (e.target.files && e.target.files[0]) {
            const url = URL.createObjectURL(e.target.files[0]);
            videoPlayer.src = url;
            videoPlayer.load();
            videoFrames = [];
            thumbnailContainer.innerHTML = '';
            videoStatus.innerText = 'Video loaded. Click "Extract Frames".';
        }
    };
    extractFramesBtn.onclick = () => {
        if (!videoPlayer.src) {
            videoStatus.innerText = 'Load a video first.';
            return;
        }
        extractFrames(videoPlayer);
    };

    // Image upload
    imageUpload.onchange = (e) => {
        if (e.target.files && e.target.files[0]) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    imageCanvas.width = img.width;
                    imageCanvas.height = img.height;
                    const ctx = imageCanvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    imageCanvas.toBlob(blob => { currentImageBlob = blob; }, 'image/jpeg', 0.9);
                    imageStatus.innerText = 'Image loaded. Ready to upload.';
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
    };
    loadImageBtn.onclick = () => {
        if (imageUpload.files && imageUpload.files[0]) {
            imageUpload.dispatchEvent(new Event('change'));
        } else {
            imageStatus.innerText = 'Select an image first.';
        }
    };

    saveBtn.onclick = uploadToDrive;
    setMode('video');
</script>
</body>
</html>
