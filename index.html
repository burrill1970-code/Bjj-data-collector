<!DOCTYPE html>
<html>
<head>
    <title>Test Upload</title>
</head>
<body>
    <input type="file" id="fileInput">
    <button onclick="upload()">Upload</button>
    <pre id="result"></pre>

    <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxS_Qa5x4ptZC-4fiNy1eZ3m_4FI6ovgEzTcAd53rW3cdaEkgoPwryRviG1vFcKU9m5/exec"; // Replace with your /exec URL

    async function upload() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) {
            document.getElementById('result').innerText = "Select a file first";
            return;
        }

        const formData = new FormData();
        formData.append('file', file);
        formData.append('labelerName', 'test');
        formData.append('clipId', Date.now().toString());
        formData.append('notes', 'test upload');

        document.getElementById('result').innerText = "Uploading...";

        try {
            const response = await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                body: formData
            });
            const text = await response.text();
            document.getElementById('result').innerText = text;
        } catch (err) {
            document.getElementById('result').innerText = "Fetch error: " + err.message;
        }
    }
    </script>
</body>
</html>
